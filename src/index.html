<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="invoice.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <h1 class="app-title">💼 Invoice Generator</h1>
            </div>
            <div class="header-right">
                <button id="themeToggle" class="theme-toggle" title="Toggle Dark Mode">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-container">
            <!-- Left Panel - Form -->
            <div class="left-panel">
                <div class="form-container">
                    <!-- Company Information -->
                    <div class="form-section">
                        <h2 class="section-title">Company Information</h2>
                        <div class="form-group">
                            <label>Company Logo</label>
                            <div class="logo-upload">
                                <input type="file" id="logoInput" accept="image/*">
                                <label for="logoInput" class="upload-btn">📤 Upload Logo</label>
                                <div id="logoPreview" class="logo-preview"></div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Company Name *</label>
                            <input type="text" id="companyName" placeholder="Your Company Ltd." required>
                        </div>
                        <div class="form-group">
                            <label>Address</label>
                            <textarea id="companyAddress" placeholder="123 Business St, City, Country" rows="2"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Phone</label>
                                <input type="tel" id="companyPhone" placeholder="+1 (555) 000-0000">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="companyEmail" placeholder="info@company.com">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Website</label>
                                <input type="url" id="companyWebsite" placeholder="www.company.com">
                            </div>
                            <div class="form-group">
                                <label>GST/VAT Number</label>
                                <input type="text" id="companyTaxId" placeholder="TAX123456789">
                            </div>
                        </div>
                    </div>

                    <!-- Client Information -->
                    <div class="form-section">
                        <h2 class="section-title">Client Information</h2>
                        <div class="form-group">
                            <label>Client Name *</label>
                            <input type="text" id="clientName" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label>Client Company</label>
                            <input type="text" id="clientCompany" placeholder="Client Company Ltd.">
                        </div>
                        <div class="form-group">
                            <label>Address</label>
                            <textarea id="clientAddress" placeholder="456 Client Ave, City, Country" rows="2"></textarea>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Phone</label>
                                <input type="tel" id="clientPhone" placeholder="+1 (555) 111-1111">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="clientEmail" placeholder="client@company.com">
                            </div>
                        </div>
                    </div>

                    <!-- Invoice Information -->
                    <div class="form-section">
                        <h2 class="section-title">Invoice Information</h2>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Invoice Number *</label>
                                <input type="text" id="invoiceNumber" placeholder="INV-001" required>
                            </div>
                            <div class="form-group">
                                <label>Currency</label>
                                <select id="currency">
                                    <option value="USD">USD ($)</option>
                                    <option value="EUR">EUR (€)</option>
                                    <option value="GBP">GBP (£)</option>
                                    <option value="INR">INR (₹)</option>
                                    <option value="CAD">CAD (C$)</option>
                                    <option value="AUD">AUD (A$)</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Invoice Date *</label>
                                <input type="date" id="invoiceDate" required>
                            </div>
                            <div class="form-group">
                                <label>Due Date</label>
                                <input type="date" id="dueDate">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Tax Percentage (%)</label>
                                <input type="number" id="taxPercentage" placeholder="18" min="0" max="100" step="0.01" value="18">
                            </div>
                            <div class="form-group">
                                <label>Discount (%)</label>
                                <input type="number" id="discountPercentage" placeholder="0" min="0" max="100" step="0.01" value="0">
                            </div>
                        </div>
                    </div>

                    <!-- Invoice Items -->
                    <div class="form-section">
                        <h2 class="section-title">Invoice Items</h2>
                        <div class="table-container">
                            <table class="items-table">
                                <thead>
                                    <tr>
                                        <th>Description</th>
                                        <th>Qty</th>
                                        <th>Unit Price</th>
                                        <th>Tax %</th>
                                        <th>Total</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="itemsTable">
                                    <!-- Items will be added here -->
                                </tbody>
                            </table>
                        </div>
                        <button class="btn btn-secondary" id="addItemBtn">+ Add Item</button>
                    </div>

                    <!-- Additional Fields -->
                    <div class="form-section">
                        <h2 class="section-title">Additional Information</h2>
                        <div class="form-group">
                            <label>Notes</label>
                            <textarea id="notes" placeholder="Thank you for your business!" rows="2"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Terms & Conditions</label>
                            <textarea id="terms" placeholder="Payment terms and conditions..." rows="2"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Signature</label>
                            <div class="signature-upload">
                                <input type="file" id="signatureInput" accept="image/*">
                                <label for="signatureInput" class="upload-btn">✍️ Upload Signature</label>
                                <div id="signaturePreview" class="signature-preview"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="form-section">
                        <div class="button-group">
                            <button class="btn btn-primary" id="generatePdfBtn">📥 Generate PDF</button>
                            <button class="btn btn-secondary" id="printBtn">🖨️ Print Invoice</button>
                            <button class="btn btn-secondary" id="saveHtmlBtn">💾 Save as HTML</button>
                        </div>
                        <div class="button-group">
                            <button class="btn btn-danger" id="clearFormBtn">🗑️ Clear Form</button>
                            <button class="btn btn-secondary" id="newInvoiceBtn">📄 New Invoice</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Panel - Preview -->
            <div class="right-panel">
                <div class="preview-container" id="invoicePreview">
                    <!-- Invoice preview will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- html2pdf.bundle provides the html2pdf() helper used in script.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.3/html2pdf.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
